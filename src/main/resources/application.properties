spring.application.name=cruddemo-advanced

# Configurações do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/hb-01-one-to-one-uni
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# Configurações do driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.orm.jdbc.bind=trace


# Desabilitar o logo do Spring Boot
spring.main.banner-mode=off

# Configurar logging para exibir apenas erros
logging.level.root=ERROR
logging.level.org.springframework=ERROR
